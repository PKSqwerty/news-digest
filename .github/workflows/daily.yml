name: Daily News Digest

on:
  workflow_dispatch: {}   # triggered by cron-job.org (or the manual Run workflow button)
  schedule:
    - cron: "43 21 * * *" # backup: 06:43 KST via GitHub's own (unreliable) scheduler

permissions:
  models: read      # free LLM fallback via GITHUB_TOKEN
  contents: write   # save digest history for continuity/weekly recap

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # Claude if set, free model if not
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          PAGES_URL: ${{ vars.PAGES_URL }}
        run: python digest.py

      - name: Save digest history
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@github.com"
          git add state/ docs/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "digest $(date +%F)"
          git fetch origin main
          git rebase origin/main || (git rebase --abort && echo "rebase conflict — skipping history save this run")
          git push origin main || echo "push skipped"

      - name: Rotate Kakao refresh token (if issued)
        if: ${{ hashFiles('new_refresh_token.txt') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            gh secret set KAKAO_REFRESH_TOKEN --body "$(cat new_refresh_token.txt)"
            echo "Refresh token rotated automatically."
          else
            echo "::warning::New refresh token issued but GH_PAT not set — update KAKAO_REFRESH_TOKEN manually."
          fi
